<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studio Portal — Bella Virtual</title>
<meta name="description" content="Bella Virtual studio partner portal: your assigned jobs, the production brief, and deliverable uploads.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FBFAF8;--ink:#232120;--soft:#5E5A56;--faint:#9C978F;--line:#E8E4DE;--line-2:#F0EDE8;--dark:#1C1A18;--green:#3E6B4C;--gold:#B8985A;--blue:#3E6076;--amber:#B5892F;--purple:#6B4E86;--red:#C4553F;--top:60px}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"Jost",system-ui,sans-serif;font-weight:300;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
  a{text-decoration:none;color:inherit}
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer}
  .micro{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint)}
  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;padding:11px 17px;border:0;transition:.18s;border-radius:7px}
  .btn:hover{background:var(--green)}
  .btn:disabled{background:#CFCAC2;cursor:default}
  .btn-line{background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:10px 15px;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;transition:.15s}
  .btn-line:hover{border-color:var(--ink)}
  .btn-sm{padding:8px 12px;font-size:10.5px}

  header{height:var(--top);display:flex;align-items:center;gap:18px;padding:0 26px;background:#fff;border-bottom:1px solid var(--line)}
  .mark{font-size:15px;letter-spacing:.42em;font-weight:400}
  .pill{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--purple);border:1px solid rgba(107,78,134,.4);border-radius:999px;padding:5px 11px}
  .who{margin-left:auto;display:flex;align-items:center;gap:11px}
  .who .av{width:32px;height:32px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;display:grid;place-items:center;flex:none}
  .who .whoinfo{line-height:1.25}
  .who .whoinfo b{font-weight:400;font-size:13.5px;display:block}
  .who .whoinfo span{font-size:11px;color:var(--faint)}
  .who .switch{margin-left:6px;display:flex;align-items:center;gap:6px;border-left:1px solid var(--line);padding-left:12px}
  .who .switch .lb{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
  .who select{font-family:inherit;font-size:12.5px;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 9px;background:#fff;cursor:pointer}
  .gated{font-size:11px;color:var(--faint)}

  .wsp{display:grid;grid-template-columns:340px 1fr;height:calc(100% - var(--top))}
  .list{border-right:1px solid var(--line);background:#fff;overflow-y:auto}
  .list-h{padding:15px 18px 10px;display:flex;justify-content:space-between;align-items:baseline;position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line-2)}
  .list-h h1{font-size:16px;font-weight:400}
  .filters{display:flex;gap:4px;flex-wrap:wrap;padding:11px 16px;border-bottom:1px solid var(--line-2)}
  .filters button{font-size:11.5px;color:var(--soft);background:transparent;border:1px solid var(--line);border-radius:99px;padding:5px 11px}
  .filters button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .job{padding:14px 18px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:.12s;border-left:3px solid transparent}
  .job:hover{background:#FAF9F7}
  .job.on{background:#F5F7F5;border-left-color:var(--green)}
  .job .jtop{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .job .jid{font-size:11px;color:var(--faint);letter-spacing:.03em}
  .job .jaddr{font-size:14.5px;color:var(--ink);margin-top:2px}
  .job .jsvc{font-size:12px;color:var(--soft);margin-top:2px}
  .job .jmeta{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border-radius:99px;white-space:nowrap}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .ch-assigned{color:var(--ink);background:#F0EDE8} .ch-inprogress{color:var(--blue);background:#E9F0F4} .ch-qa{color:var(--purple);background:#EFEAF4} .ch-revision{color:var(--amber);background:#FBF3E2} .ch-done{color:#fff;background:var(--green)}
  .due{font-size:12px} .due.over{color:var(--red)} .due.soon{color:var(--amber)} .due.ok{color:var(--faint)}

  /* brief detail */
  .detail{overflow-y:auto;padding:0 32px 60px}
  .detail-empty{height:100%;display:grid;place-items:center;color:var(--faint);font-size:14px}
  .d-head{position:sticky;top:0;z-index:6;background:rgba(251,250,248,.97);backdrop-filter:blur(6px);display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin:0 -32px 22px;padding:20px 32px 18px}
  .d-head .kick{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--purple);display:flex;align-items:center;gap:8px}
  .d-head .kick .pid{background:var(--purple);color:#fff;border-radius:5px;padding:2px 8px;letter-spacing:.06em}
  .d-head h2{font-size:24px;font-weight:400;margin-top:7px;letter-spacing:-.01em}
  .d-head .sub{font-size:13px;color:var(--soft);margin-top:5px}
  .d-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .d-grid{display:grid;grid-template-columns:1fr 300px;gap:30px;align-items:start}
  @media(max-width:1000px){.d-grid{grid-template-columns:1fr}}
  .sec-t{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);margin:0 0 12px}
  .block{margin-bottom:26px}
  .svc-list{display:flex;flex-direction:column;gap:7px}
  .svc{display:flex;align-items:center;gap:11px;padding:11px 14px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .svc .si{width:30px;height:30px;border-radius:7px;background:#EEF3EE;display:grid;place-items:center;color:var(--green);flex:none;font-size:14px}
  .svc b{font-weight:400}
  .svc span{font-size:12px;color:var(--faint);display:block}
  .svc .qty{margin-left:auto;font-size:13px;color:var(--soft);white-space:nowrap}
  /* per-photo shot list */
  .shots{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .shot{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .shot .ph{aspect-ratio:4/3;background:#eee center/cover;position:relative}
  .shot .ph .rev{position:absolute;top:6px;right:6px;background:var(--amber);color:#fff;font-size:10px;padding:2px 7px;border-radius:99px}
  .shot .cap{padding:8px 10px}
  .shot .cap b{font-weight:400;font-size:13px;display:block;text-transform:capitalize}
  .shot .cap .sty{font-size:11.5px;color:var(--green);margin-top:2px}
  .shot .cap .sty.dc{color:var(--soft)}
  /* files */
  .files{display:flex;flex-direction:column;gap:6px}
  .file{display:flex;align-items:center;gap:10px;padding:10px 13px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:13px}
  .file .fi{width:26px;height:26px;border-radius:6px;background:#F1EEE8;display:grid;place-items:center;color:var(--soft);flex:none}
  .file .dl{margin-left:auto;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--green)}
  .file.missing{border-style:dashed;color:var(--amber)}
  .file.missing .fi{background:#FBF3E2;color:var(--amber)}
  /* side card */
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px}
  .card h4{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);margin-bottom:12px}
  .kv{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:7px 0;border-bottom:1px solid var(--line-2)}
  .kv:last-child{border-bottom:0}
  .kv span{color:var(--soft)} .kv b{font-weight:400;text-align:right}
  .kv b.over{color:var(--red)}
  .note-card{background:#FAF7EF;border-color:#EADFC5}
  .note-card p{font-size:13.5px;color:#5b5140;line-height:1.55}
  /* revision requests */
  .rev-list{display:flex;flex-direction:column;gap:9px}
  .rev-item{display:flex;gap:14px;border:1px solid #EADFC5;background:#FBF7EE;border-radius:8px;padding:12px 14px;align-items:flex-start}
  .rev-photo{width:128px;flex:none;aspect-ratio:4/3;border-radius:6px;background:#eee center/cover;position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
  .rev-pin{position:absolute;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50% 50% 50% 2px;background:var(--amber);color:#fff;font-size:11px;display:grid;place-items:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .rev-body{flex:1;min-width:0}
  .rev-loc{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:#8a6d33;margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .rev-loc .rn{width:17px;height:17px;border-radius:50%;background:var(--amber);color:#fff;font-size:10px;display:grid;place-items:center}
  .rev-item .rt{font-size:13.5px;color:var(--ink)}
  .rev-item .rw{font-size:11.5px;color:var(--faint);margin-top:5px}
  /* upload */
  .up{border:2px dashed #BFD3C2;background:#F1F7F2;border-radius:10px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s}
  .up:hover,.up.drag{border-color:var(--green);background:#E7F1E9}
  .up .ui{width:42px;height:42px;border-radius:50%;background:#E1EDE3;display:grid;place-items:center;flex:none}
  .up .ui svg{width:20px;height:20px;stroke:var(--green);fill:none;stroke-width:1.6}
  .up .ut b{font-weight:400;font-size:14px;display:block}
  .up .ut span{font-size:12px;color:var(--soft)}
  .up-btn{margin-left:auto;background:var(--ink);color:#fff;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:10px 15px;border-radius:6px;flex:none}
  .deliv{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .deliv .dt{width:66px;height:66px;border-radius:6px;overflow:hidden;border:1px solid var(--line);position:relative}
  .deliv .dt img{width:100%;height:100%;object-fit:cover}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:12px 20px;border-radius:99px;z-index:120;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}

  /* focus-mode entry buttons */
  .focus-cta{background:linear-gradient(120deg,#3E6B4C,#2f5a3d);color:#fff;border:0;font-family:inherit;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;padding:12px 18px;border-radius:8px;display:inline-flex;align-items:center;gap:9px;cursor:pointer;transition:.16s;box-shadow:0 6px 18px -8px rgba(62,107,76,.7)}
  .focus-cta:hover{transform:translateY(-1px);box-shadow:0 10px 24px -8px rgba(62,107,76,.75)}
  .focus-cta .pl{font-size:15px}

  /* FOCUS MODE — game-like task runner */
  .focus{position:fixed;inset:0;z-index:200;background:radial-gradient(1200px 800px at 50% -10%,#26313f,#14161c 60%);display:none;flex-direction:column;color:#EEF0F3}
  .focus.open{display:flex}
  .f-top{display:flex;align-items:center;gap:16px;padding:16px 26px}
  .f-top .f-id{font-size:12px;letter-spacing:.06em;color:#9FB0C4}
  .f-top .f-id b{color:#fff;font-weight:400}
  .f-top .f-x{margin-left:auto;width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,.16);background:transparent;color:#cdd4de;font-size:20px;cursor:pointer;line-height:1}
  .f-top .f-x:hover{background:rgba(255,255,255,.08);color:#fff}
  .f-xp{font-size:12px;color:#9FB0C4}
  .f-xp b{color:var(--gold);font-weight:400}
  /* progress dots */
  .f-prog{display:flex;align-items:center;gap:8px;padding:0 26px 6px}
  .f-track{flex:1;height:8px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}
  .f-track span{display:block;height:100%;background:linear-gradient(90deg,var(--green),#7fbf94);border-radius:99px;transition:width .4s cubic-bezier(.5,1.6,.4,1)}
  .f-dots{display:flex;gap:6px}
  .f-dot{width:26px;height:26px;border-radius:8px;border:1px solid rgba(255,255,255,.16);display:grid;place-items:center;font-size:11px;color:#9FB0C4;cursor:pointer;transition:.15s;background:rgba(255,255,255,.03)}
  .f-dot.cur{border-color:var(--gold);color:#fff;box-shadow:0 0 0 2px rgba(184,152,90,.3)}
  .f-dot.done{background:var(--green);border-color:var(--green);color:#fff}
  .f-count{font-size:12.5px;color:#9FB0C4;white-space:nowrap}

  .f-stage{flex:1;display:grid;grid-template-columns:1.5fr 1fr;gap:26px;padding:14px 26px 22px;min-height:0}
  @media(max-width:900px){.f-stage{grid-template-columns:1fr;overflow-y:auto}}
  .f-visual{position:relative;border-radius:14px;overflow:hidden;background:#0d0f13 center/contain no-repeat;min-height:0;border:1px solid rgba(255,255,255,.08);display:grid;place-items:center}
  .f-visual img{max-width:100%;max-height:100%;object-fit:contain;display:block}
  .f-pin{position:absolute;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50% 50% 50% 3px;background:var(--gold);color:#1c1a18;font-size:15px;font-weight:500;display:grid;place-items:center;border:3px solid #fff;box-shadow:0 4px 14px rgba(0,0,0,.5);animation:pinpulse 1.6s ease-in-out infinite}
  @keyframes pinpulse{0%,100%{box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 0 0 rgba(184,152,90,.5)}50%{box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 0 12px rgba(184,152,90,0)}}
  .f-tag{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:rgba(0,0,0,.55);color:#fff;padding:5px 11px;border-radius:99px}

  .f-side{display:flex;flex-direction:column;min-height:0}
  .f-kind{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
  .f-title{font-size:24px;font-weight:300;margin:8px 0 4px;letter-spacing:-.01em;color:#fff}
  .f-loc{font-size:12.5px;color:#9FB0C4;margin-bottom:16px}
  .f-instr{font-size:16px;line-height:1.5;color:#E6E9ED;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:16px 18px}
  .f-instr .by{font-size:12px;color:#8F9AA8;margin-top:8px}
  .f-up{margin-top:14px;border:2px dashed rgba(127,191,148,.5);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;background:rgba(62,107,76,.12)}
  .f-up:hover,.f-up.drag{border-color:#7fbf94;background:rgba(62,107,76,.22)}
  .f-up .ui{width:38px;height:38px;border-radius:50%;background:rgba(127,191,148,.2);display:grid;place-items:center;flex:none}
  .f-up .ui svg{width:19px;height:19px;stroke:#9fe0b3;fill:none;stroke-width:1.7}
  .f-up b{font-weight:400;font-size:14px;color:#fff;display:block}
  .f-up span{font-size:12px;color:#9FB0C4}
  .f-up .done-chip{margin-left:auto;color:#7fbf94;font-size:12.5px}
  .f-thumbs{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .f-thumbs .t{width:46px;height:46px;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
  .f-thumbs .t img{width:100%;height:100%;object-fit:cover}

  .f-actions{margin-top:auto;padding-top:16px;display:flex;align-items:center;gap:10px}
  .f-nav{width:44px;height:44px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:transparent;color:#cdd4de;font-size:18px;cursor:pointer;flex:none}
  .f-nav:hover:not(:disabled){background:rgba(255,255,255,.08);color:#fff}
  .f-nav:disabled{opacity:.3;cursor:default}
  .f-done{flex:1;height:52px;border:0;border-radius:10px;background:var(--gold);color:#1c1a18;font-family:inherit;font-size:14px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:9px}
  .f-done:hover{background:#c9a968}
  .f-done.is-done{background:rgba(127,191,148,.18);color:#7fbf94;border:1px solid rgba(127,191,148,.4)}
  .f-hint{text-align:center;font-size:11px;color:#6B7684;padding:0 26px 14px}
  .f-hint kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:4px;padding:1px 6px;font-family:inherit;font-size:11px;color:#cdd4de}
  /* burst on done */
  .f-burst{position:absolute;inset:0;pointer-events:none;display:grid;place-items:center;z-index:5}
  .f-burst .chk{width:120px;height:120px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-size:60px;opacity:0;transform:scale(.4)}
  .f-burst.go .chk{animation:burst .7s cubic-bezier(.3,1.5,.5,1) forwards}
  @keyframes burst{0%{opacity:0;transform:scale(.4)}30%{opacity:1;transform:scale(1.05)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.15)}}

  /* completion */
  .f-complete{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;z-index:8;background:radial-gradient(800px 500px at 50% 40%,#2a3a2f,#14161c 70%)}
  .f-complete.show{display:flex}
  .f-complete .trophy{font-size:64px}
  .f-complete h2{font-size:32px;font-weight:300;color:#fff}
  .f-complete p{font-size:15px;color:#9FB0C4;max-width:40ch}
  .f-complete .cbtns{display:flex;gap:10px;margin-top:8px}
  .f-complete .btn-primary{background:var(--gold);color:#1c1a18;border:0;font-family:inherit;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:14px 24px;border-radius:10px;cursor:pointer}
  .f-complete .btn-ghost{background:transparent;color:#cdd4de;border:1px solid rgba(255,255,255,.2);font-family:inherit;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:14px 22px;border-radius:10px;cursor:pointer}
  .confetti{position:absolute;top:-10px;width:9px;height:14px;opacity:0}
  .f-complete.show .confetti{animation:fall linear forwards}
  @keyframes fall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:.9;transform:translateY(105vh) rotate(540deg)}}

  /* PHOTO VERSION BOARD — per-photo version history */
  .vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:12px}
  .vcard{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;transition:box-shadow .2s}
  .vcard.levelup{animation:vlevel .8s ease}
  @keyframes vlevel{0%{box-shadow:0 0 0 0 rgba(184,152,90,.65)}100%{box-shadow:0 0 0 16px rgba(184,152,90,0)}}
  .vc-stage{position:relative;aspect-ratio:4/3;background:#14161c;overflow:hidden;user-select:none}
  .vc-img,.vc-orig{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .vc-orig{display:none;z-index:2}
  .vc-stage.cmp .vc-orig{display:block;clip-path:inset(0 calc(100% - var(--cmpX,50%)) 0 0)}
  .vc-handle{position:absolute;top:0;bottom:0;left:var(--cmpX,50%);width:2px;background:#fff;z-index:4;display:none;cursor:ew-resize;transform:translateX(-1px);box-shadow:0 0 0 1px rgba(0,0,0,.2)}
  .vc-stage.cmp .vc-handle{display:block}
  .vc-handle::after{content:"‹ ›";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:#fff;color:var(--ink);font-size:11px;display:grid;place-items:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .vc-badge{position:absolute;top:8px;left:8px;z-index:5;font-size:10px;letter-spacing:.05em;text-transform:uppercase;background:rgba(20,18,16,.72);color:#fff;padding:4px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:5px}
  .vc-badge.latest{background:var(--gold);color:#1c1a18}
  .vc-cmp{position:absolute;top:8px;right:8px;z-index:5;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;background:rgba(20,18,16,.6);color:#fff;border:0;padding:5px 10px;border-radius:99px;cursor:pointer}
  .vc-cmp.on{background:#fff;color:var(--ink)}
  .vc-cmptag{position:absolute;bottom:8px;z-index:5;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.55);padding:3px 8px;border-radius:99px;display:none}
  .vc-stage.cmp .vc-cmptag{display:block}
  .vc-cmptag.l{left:8px}.vc-cmptag.r{right:8px}
  .vc-foot{padding:11px 13px}
  .vc-name{font-size:14px;font-weight:400;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .vc-name .vc-style{font-size:11px;color:var(--green);white-space:nowrap}
  .vc-strip{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:2px}
  .vchip{flex:none;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer;padding:0;width:54px;transition:.13s;position:relative;overflow:hidden}
  .vchip img{width:100%;height:38px;object-fit:cover;display:block}
  .vchip .vl{display:block;font-size:9px;letter-spacing:.03em;padding:3px 0;color:var(--soft);text-align:center}
  .vchip.viewing{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
  .vchip.cur{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .vchip.cur::after{content:"★";position:absolute;top:2px;right:3px;font-size:9px;color:var(--gold);text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .vc-add{flex:none;width:54px;min-height:59px;border:1.5px dashed var(--line);border-radius:7px;display:grid;place-items:center;cursor:pointer;color:var(--faint);font-size:11px;line-height:1.1;text-align:center;transition:.14s}
  .vc-add:hover{border-color:var(--green);color:var(--green);background:#F4F8F4}
  .vc-add .plus{font-size:17px;display:block}
</style>
</head>
<body>
<header>
  <a class="mark" href="bella-cms.html">BELLA</a>
  <span class="pill">Studio Portal</span>
  <span class="gated">Scoped access · no client identities or pricing</span>
  <div class="who" id="who"></div>
</header>

<div class="wsp">
  <aside class="list">
    <div class="list-h"><h1>Your jobs</h1><span class="micro" id="jobCount"></span></div>
    <div class="filters" id="filters"></div>
    <div id="jobs"></div>
  </aside>
  <section class="detail" id="detail"><div class="detail-empty">Select a job to see its production brief.</div></section>
</div>

<div class="focus" id="focus">
  <div class="f-top"><div class="f-id" id="fId"></div><div class="f-xp" id="fXp"></div><button class="f-x" id="fClose" title="Exit (Esc)">×</button></div>
  <div class="f-prog"><span class="f-count" id="fCount"></span><div class="f-track"><span id="fBar"></span></div><div class="f-dots" id="fDots"></div></div>
  <div class="f-stage" id="fStage"></div>
  <div class="f-hint">Shortcuts: <kbd>←</kbd> <kbd>→</kbd> move · <kbd>Enter</kbd> mark done · <kbd>U</kbd> upload · <kbd>Esc</kbd> exit</div>
  <div class="f-complete" id="fComplete">
    <div class="trophy">🏆</div><h2>Round complete!</h2><p id="fcMsg"></p>
    <div class="cbtns"><button class="btn-primary" id="fcSubmit">Submit round for QA</button><button class="btn-ghost" id="fcBack">Back to brief</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var A='assets/projects/';
  var ST={
    assigned:{label:'Assigned',chip:'ch-assigned'},
    inprogress:{label:'In progress',chip:'ch-inprogress'},
    qa:{label:'Submitted for QA',chip:'ch-qa'},
    revision:{label:'Changes requested',chip:'ch-revision'},
    done:{label:'Approved',chip:'ch-done'}
  };
  function room(id,label,style){ return {id:id,label:label,style:style,orig:A+id+'-before.jpg'}; }
  /* Contractor network — each partner has their own scoped dashboard, filtered to their assignments. */
  var CONTRACTORS={
    A:{name:'Studio A · Manila',av:'SA',spec:'Virtual staging & photo editing'},
    B:{name:'Studio B · Bengaluru',av:'SB',spec:'Staging & floor plans'},
    rove:{name:'Rove 3D',av:'R3',spec:'3D renders & virtual tours'}
  };
  function param(k){ try{ return new URLSearchParams(location.search).get(k); }catch(e){ return null; } }
  var cur = CONTRACTORS[param('studio')] ? param('studio') : 'A';
  /* SAMPLE jobs across contractors. Client identity + pricing are intentionally absent. */
  var JOBS=[
    {id:'BV-10531', studio:'A', ptype:'Residential · empty listing', addr:'240 Aspen Ridge', due:20, status:'assigned',
      services:[{k:'stage',n:'Virtual staging',s:'Furnish empty rooms',qty:'6 photos'}],
      buyer:'Target buyer: young family, mid-market. Warm, family-friendly, not cold or ultra-modern.',
      rooms:[room('living','Living room','designer'),room('kitchen','Kitchen','designer'),room('dining','Dining','designer'),room('primary','Primary bedroom','designer'),room('bed2','Bedroom 2','scandi'),room('bed3','Bedroom 3','designer')],
      files:[{n:'6 room photos.zip',ok:true},{n:'Reference · Pinterest board.pdf',ok:true}], revisions:[] },
    {id:'BV-10471', studio:'A', ptype:'Residential · empty listing', addr:'19 Maple Grove', due:-1, status:'inprogress',
      services:[{k:'stage',n:'Virtual staging',s:'Furnish empty rooms',qty:'9 photos'},{k:'sky',n:'Sky replacement',s:'Swap grey skies on exteriors',qty:'2 photos'}],
      buyer:'Target buyer: downsizing couple. Transitional, calm, uncluttered.',
      rooms:[room('living','Living room','contemporary'),room('primary','Primary bedroom','contemporary'),room('dining','Dining','contemporary')],
      files:[{n:'9 room photos.zip',ok:true},{n:'2 exterior photos.zip',ok:true}], revisions:[] },
    {id:'BV-10428', studio:'A', ptype:'Residential · empty listing', addr:'42 Bayview Terrace', due:-3, status:'revision',
      services:[{k:'stage',n:'Virtual staging',s:'Furnish empty rooms',qty:'8 photos'}],
      buyer:'Target buyer: professional couple. Warm modern, sells the feeling of home.',
      rooms:[room('living','Living room','designer'),room('kitchen','Kitchen','designer')],
      files:[{n:'8 room photos.zip',ok:true}],
      revisions:[
        {n:1,room:'Living room',rid:'living',x:26,y:48,t:'Swap the artwork for something warmer; the blue feels cold against the staging.',by:'Agent'},
        {n:2,room:'Living room',rid:'living',x:71,y:72,t:'Rug is a little small; size up so it sits under the front sofa legs.',by:'Agent'},
        {n:3,room:'Kitchen',rid:'kitchen',x:52,y:42,t:'Add a couple of counter stools at the island.',by:'Agent'}
      ] },
    {id:'BV-10502', studio:'B', ptype:'Residential · empty listing', addr:'120 Bayview Ave', due:5, status:'qa',
      services:[{k:'stage',n:'Virtual staging',s:'Furnish empty rooms',qty:'6 photos'}],
      buyer:'Target buyer: first-time buyer. Bright, aspirational, Scandinavian-leaning.',
      rooms:[room('primary','Primary bedroom','scandi'),room('living','Living room','scandi')],
      files:[{n:'6 room photos.zip',ok:true}], revisions:[] },
    {id:'BV-10535', studio:'B', ptype:'Residential · resale', addr:'305 Harbour St, #1204', due:14, status:'assigned',
      services:[{k:'floor',n:'3D floor plan',s:'Furnished, walkable, per level',qty:'2 floors'}],
      buyer:'Deliverable spec: light, neutral furnishing to match the staging brand.',
      rooms:[],
      files:[{n:'Architectural blueprints.pdf',ok:true},{n:'Floor dimensions.pdf',ok:false}], revisions:[] },
    {id:'BV-10540', studio:'rove', ptype:'Commercial · not built yet', addr:'1200 King St W · Tower B', due:30, status:'assigned',
      services:[{k:'rint',n:'Interior 3D renders',s:'Photoreal rooms from plans',qty:'4 renders'},{k:'rext',n:'Exterior 3D render',s:'Streetscape elevation',qty:'1 render'}],
      buyer:'Deliverable spec: bright, aspirational, evening light. Sales-centre quality.',
      rooms:[],
      files:[{n:'CAD drawings.zip',ok:true},{n:'Materials & finishes schedule.pdf',ok:true},{n:'Site photos.zip',ok:false}], revisions:[] },
    {id:'BV-10499', studio:'rove', ptype:'Residential · pre-construction', addr:'88 Lakeshore · Suite 705', due:2, status:'inprogress',
      services:[{k:'tour',n:'3D virtual tour',s:'Walkable, stitched from renders',qty:'1 tour'}],
      buyer:'Deliverable spec: seamless walkthrough, staged in a warm contemporary look.',
      rooms:[],
      files:[{n:'Unit plans.pdf',ok:true},{n:'Render set (interior).zip',ok:true}], revisions:[] }
  ];
  var STY={designer:'Designer’s choice',modern:'Modern',scandi:'Scandinavian',coastal:'Coastal',midcentury:'Mid-century',farmhouse:'Farmhouse',contemporary:'Contemporary'};

  var curId=(JOBS.filter(function(j){return j.studio===cur;})[0]||{}).id, filter='all';
  var deliverables={}; // jobId -> [urls]
  function renderHeader(){
    var c=CONTRACTORS[cur];
    var opts=Object.keys(CONTRACTORS).map(function(k){return '<option value="'+k+'"'+(k===cur?' selected':'')+'>'+CONTRACTORS[k].name+'</option>';}).join('');
    $('who').innerHTML='<span class="av">'+c.av+'</span><div class="whoinfo"><b>'+c.name+'</b><span>'+c.spec+'</span></div>'
      +'<span class="switch"><span class="lb">View as</span><select id="studioSwitch">'+opts+'</select></span>';
    $('studioSwitch').onchange=function(){ location.search='?studio='+this.value; };
  }
  function $(id){return document.getElementById(id);}
  function esc(s){return (s==null?'':''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function job(){ return JOBS.filter(function(j){return j.id===curId;})[0]; }
  function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('show');},2100);}
  function dueTag(j){ if(j.status==='done') return '<span class="due ok">Done</span>'; if(j.due<0) return '<span class="due over">'+Math.abs(j.due)+'h overdue</span>'; if(j.due<=6) return '<span class="due soon">Due in '+j.due+'h</span>'; return '<span class="due ok">Due in '+j.due+'h</span>'; }

  var FILTERS=[{k:'all',l:'All'},{k:'assigned',l:'New'},{k:'inprogress',l:'In progress'},{k:'revision',l:'Changes'},{k:'qa',l:'In QA'}];
  function renderFilters(){
    $('filters').innerHTML=FILTERS.map(function(f){return '<button data-k="'+f.k+'"'+(filter===f.k?' class="on"':'')+'>'+f.l+'</button>';}).join('');
    $('filters').querySelectorAll('button').forEach(function(b){ b.onclick=function(){ filter=b.getAttribute('data-k'); renderList(); }; });
  }
  function renderList(){
    var list=JOBS.filter(function(j){ return j.studio===cur && (filter==='all'||j.status===filter); });
    $('jobCount').textContent=list.length+' job'+(list.length===1?'':'s');
    $('jobs').innerHTML=list.map(function(j){
      var st=ST[j.status];
      return '<div class="job'+(j.id===curId?' on':'')+'" data-id="'+j.id+'"><div class="jtop"><span class="jid">#'+j.id+'</span>'+dueTag(j)+'</div>'
        +'<div class="jaddr">'+esc(j.addr)+'</div>'
        +'<div class="jsvc">'+j.services.map(function(s){return esc(s.n);}).join(' · ')+'</div>'
        +'<div class="jmeta"><span class="chip '+st.chip+'"><span class="dot"></span>'+st.label+'</span>'+(j.revisions.length?'<span class="micro" style="color:var(--amber)">'+j.revisions.length+' change'+(j.revisions.length>1?'s':'')+'</span>':'')+'</div></div>';
    }).join('');
    $('jobs').querySelectorAll('.job').forEach(function(el){ el.onclick=function(){ curId=el.getAttribute('data-id'); renderList(); renderDetail(); }; });
  }

  var SIC={stage:'▤',floor:'▦',dusk:'☾',sky:'☁',tour:'◍',reno:'✎',rint:'◳',rext:'⌂'};
  function renderDetail(){
    var j=job(); if(!j){ $('detail').innerHTML='<div class="detail-empty">Select a job.</div>'; return; }
    var st=ST[j.status];
    var actions='';
    var nTasks=buildTasks(j).length;
    var focusable=(j.status==='assigned'||j.status==='inprogress'||j.status==='revision') && nTasks;
    var focusBtn=focusable? '<button class="focus-cta" id="focusBtn"><span class="pl">▶</span>'+(j.revisions.length? ('Work through '+j.revisions.length+' change'+(j.revisions.length>1?'s':'')) : ('Focus mode · '+nTasks+' task'+(nTasks>1?'s':'')))+'</button>' : '';
    if(j.status==='assigned') actions=focusBtn+'<button class="btn" id="startBtn">Start job</button>';
    else if(j.status==='inprogress') actions=focusBtn+'<button class="btn-line btn-sm" id="askBtn">Ask Bella</button><button class="btn" id="submitBtn">Submit for QA</button>';
    else if(j.status==='revision') actions=focusBtn+'<button class="btn-line btn-sm" id="askBtn">Ask Bella</button><button class="btn" id="submitBtn">Submit revised for QA</button>';
    else if(j.status==='qa') actions='<span class="micro" style="color:var(--purple)">Awaiting Bella QA</span>';
    else if(j.status==='done') actions='<span class="micro" style="color:var(--green)">Approved &amp; delivered</span>';

    var shots=j.rooms.map(function(r){
      var isRev=j.revisions.some(function(x){return x.room.toLowerCase()===r.label.toLowerCase();});
      var dc=r.style==='designer';
      return '<div class="shot"><div class="ph" style="background-image:url('+r.orig+')">'+(isRev?'<span class="rev">revise</span>':'')+'</div>'
        +'<div class="cap"><b>'+esc(r.label)+'</b><span class="sty'+(dc?' dc':'')+'">'+(dc?'✦ ':'')+esc(STY[r.style]||r.style)+'</span></div></div>';
    }).join('');

    var files=j.files.map(function(f){
      return f.ok? '<div class="file"><span class="fi">▤</span>'+esc(f.n)+'<span class="dl">Download</span></div>'
                 : '<div class="file missing"><span class="fi">!</span>'+esc(f.n)+' — not provided yet<span class="dl" style="color:var(--amber)">Waiting</span></div>';
    }).join('');

    var revBlock = j.revisions.length? '<div class="block"><div class="sec-t">Changes requested — each pinned to its exact photo</div><div class="rev-list">'
      +j.revisions.map(function(rq){
        var img=rq.rid? A+rq.rid+'-after.jpg' : '';
        return '<div class="rev-item">'
          +(img? '<div class="rev-photo" style="background-image:url('+img+')"><span class="rev-pin" style="left:'+rq.x+'%;top:'+rq.y+'%">'+rq.n+'</span></div>' : '')
          +'<div class="rev-body"><div class="rev-loc"><span class="rn">'+rq.n+'</span>'+esc(rq.room)+' · pin '+rq.n+'</div>'
          +'<div class="rt">'+esc(rq.t)+'</div><div class="rw">Requested by '+esc(rq.by)+'</div></div></div>';
      }).join('')
      +'</div></div>' : '';

    var delivs=(deliverables[j.id]||[]);
    var upBlock = (j.status==='inprogress'||j.status==='revision')? '<div class="block"><div class="sec-t">Upload your deliverables</div>'
      +'<label class="up" id="upZone"><input type="file" id="upInput" accept="image/*" multiple hidden><span class="ui"><svg viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 20h14"/></svg></span><span class="ut"><b>Drop your finished files here</b><span>or click to browse · we run QA before the client sees them</span></span><span class="up-btn">Choose files</span></label>'
      +'<div class="deliv" id="deliv">'+delivs.map(function(u){return '<div class="dt"><img src="'+u+'"></div>';}).join('')+'</div></div>' : '';

    $('detail').innerHTML=
      '<div class="d-head"><div><div class="kick">Production brief <span class="pid">#'+j.id+'</span></div><h2>'+esc(j.addr)+'</h2><div class="sub">'+esc(j.ptype)+' · <span class="chip '+st.chip+'" style="vertical-align:2px"><span class="dot"></span>'+st.label+'</span></div></div>'
        +'<div class="d-actions">'+actions+'</div></div>'
      +'<div class="d-grid"><div>'
        + revBlock
        +'<div class="block"><div class="sec-t">Services to produce</div><div class="svc-list">'
          +j.services.map(function(s){ return '<div class="svc"><span class="si">'+(SIC[s.k]||'▤')+'</span><span><b>'+esc(s.n)+'</b><span>'+esc(s.s)+'</span></span><span class="qty">'+esc(s.qty)+'</span></div>'; }).join('')
        +'</div></div>'
        + (j.rooms.length? '<div class="block"><div class="sec-t">Photo versions — original, current &amp; every revision</div>'+renderVersions(j)+'</div>' : '')
        + upBlock
      +'</div><div>'
        +'<div class="card"><h4>Job details</h4>'
          +'<div class="kv"><span>Turnaround</span><b class="'+(j.due<0&&j.status!=='done'?'over':'')+'">'+(j.status==='done'?'Done':(j.due<0?Math.abs(j.due)+'h overdue':'Due in '+j.due+'h'))+'</b></div>'
          +(j.rooms.length? '<div class="kv"><span>Photos to stage</span><b>'+j.rooms.length+'</b></div>' : '')
          +'<div class="kv"><span>Services</span><b>'+j.services.length+'</b></div>'
          +'<div class="kv"><span>Contractor</span><b>'+esc(CONTRACTORS[cur].name)+'</b></div>'
          +'<div class="kv"><span>Status</span><b>'+st.label+'</b></div>'
        +'</div>'
        +'<div class="card note-card"><h4>Buyer &amp; direction</h4><p>'+esc(j.buyer)+'</p></div>'
        +'<div class="card"><h4>Source files</h4><div class="files">'+files+'</div></div>'
      +'</div></div>';

    var sb=$('startBtn'); if(sb) sb.onclick=function(){ j.status='inprogress'; toast('#'+j.id+' started'); renderList(); renderDetail(); };
    var subm=$('submitBtn'); if(subm) subm.onclick=function(){ j.status='qa'; toast('#'+j.id+' submitted for Bella QA'); renderList(); renderDetail(); };
    var ask=$('askBtn'); if(ask) ask.onclick=function(){ toast('Question sent to Bella (demo)'); };
    var fb=$('focusBtn'); if(fb) fb.onclick=function(){ openFocus(j); };
    bindUp(j); bindVersions(j);
  }

  /* ---------- PHOTO VERSION BOARD ---------- */
  var versions={};   // key jobId:roomId -> [{label,url}]
  var viewingV={};   // key -> index currently viewed
  function vkey(j,r){ return j.id+':'+r.id; }
  function initVersions(j){
    if(!j.rooms) return;
    var staged=(j.status!=='assigned');
    j.rooms.forEach(function(r){ var k=vkey(j,r); if(!versions[k]){ versions[k]=[{label:'Original',url:A+r.id+'-before.jpg'}]; if(staged) versions[k].push({label:'v1',url:A+r.id+'-after.jpg'}); } });
  }
  function renderVersions(j){
    initVersions(j);
    return '<div class="vgrid">'+j.rooms.map(function(r){
      var k=vkey(j,r), arr=versions[k], cur=arr.length-1, view=(viewingV[k]!=null?viewingV[k]:cur), dc=r.style==='designer';
      var badge=(view===cur)?'<span class="vc-badge latest">★ '+esc(arr[cur].label)+' · latest</span>':'<span class="vc-badge">Viewing '+esc(arr[view].label)+'</span>';
      var strip=arr.map(function(v,i){ return '<button type="button" class="vchip'+(i===view?' viewing':'')+(i===cur?' cur':'')+'" data-k="'+k+'" data-i="'+i+'"><img src="'+v.url+'" alt=""><span class="vl">'+esc(v.label)+'</span></button>'; }).join('')
        +'<label class="vc-add" data-addk="'+k+'"><input type="file" accept="image/*" multiple hidden><span class="plus">+</span>New</label>';
      return '<div class="vcard" data-card="'+k+'">'
        +'<div class="vc-stage" data-stage="'+k+'">'
          +'<img class="vc-img" src="'+arr[view].url+'" alt=""><img class="vc-orig" src="'+arr[0].url+'" alt="">'
          +badge+'<button type="button" class="vc-cmp" data-cmpk="'+k+'">Compare</button>'
          +'<span class="vc-cmptag l">Original</span><span class="vc-cmptag r">'+esc(arr[view].label)+'</span><div class="vc-handle"></div>'
        +'</div>'
        +'<div class="vc-foot"><div class="vc-name">'+esc(r.label)+'<span class="vc-style">'+(dc?'✦ Designer':esc(STY[r.style]||r.style))+'</span></div>'
          +'<div class="vc-strip">'+strip+'</div></div></div>';
    }).join('')+'</div>';
  }
  function refreshCard(k){
    var card=document.querySelector('.vcard[data-card="'+k+'"]'); if(!card) return;
    var arr=versions[k], cur=arr.length-1, view=(viewingV[k]!=null?viewingV[k]:cur);
    card.querySelector('.vc-img').src=arr[view].url;
    card.querySelector('.vc-cmptag.r').textContent=arr[view].label;
    var badge=card.querySelector('.vc-badge');
    if(view===cur){ badge.className='vc-badge latest'; badge.textContent='★ '+arr[cur].label+' · latest'; }
    else { badge.className='vc-badge'; badge.textContent='Viewing '+arr[view].label; }
    card.querySelectorAll('.vchip').forEach(function(b){ var i=+b.getAttribute('data-i'); b.classList.toggle('viewing',i===view); b.classList.toggle('cur',i===cur); });
  }
  function addVersion(k,files){
    var arr=versions[k]; if(!arr) return; var added=0;
    [].slice.call(files).forEach(function(f){ if(f.type&&f.type.indexOf('image')===0){ var vn=arr.filter(function(v){return v.label!=='Original';}).length+1; arr.push({label:'v'+vn,url:URL.createObjectURL(f)}); added++; } });
    if(!added) return;
    viewingV[k]=arr.length-1;
    renderDetail();
    var card=document.querySelector('.vcard[data-card="'+k+'"]');
    if(card){ card.classList.add('levelup'); }
    toast('New version saved · '+arr[arr.length-1].label);
  }
  function bindVersions(j){
    document.querySelectorAll('.vchip').forEach(function(b){ b.onclick=function(){ viewingV[b.getAttribute('data-k')]=+b.getAttribute('data-i'); refreshCard(b.getAttribute('data-k')); }; });
    document.querySelectorAll('.vc-add').forEach(function(l){ var inp=l.querySelector('input'); inp.onchange=function(){ addVersion(l.getAttribute('data-addk'),inp.files); inp.value=''; }; });
    document.querySelectorAll('.vc-cmp').forEach(function(b){ b.onclick=function(){ var st=document.querySelector('.vc-stage[data-stage="'+b.getAttribute('data-cmpk')+'"]'); var on=st.classList.toggle('cmp'); b.classList.toggle('on',on); if(on&&!st.style.getPropertyValue('--cmpX')) st.style.setProperty('--cmpX','50%'); }; });
    document.querySelectorAll('.vc-stage').forEach(function(st){
      var dragging=false;
      function set(e){ var r=st.getBoundingClientRect(); var x=((e.clientX)-r.left)/r.width*100; st.style.setProperty('--cmpX',Math.max(0,Math.min(100,x))+'%'); }
      st.addEventListener('pointerdown',function(e){ if(!st.classList.contains('cmp')) return; dragging=true; set(e); });
      window.addEventListener('pointermove',function(e){ if(dragging) set(e); });
      window.addEventListener('pointerup',function(){ dragging=false; });
    });
  }

  /* ---------- FOCUS MODE: game-like task runner ---------- */
  function buildTasks(j){
    if(j.revisions && j.revisions.length){
      return j.revisions.map(function(rq){ return {kind:'Revision request',title:'Change '+rq.n,loc:rq.room+' · pin '+rq.n,instr:rq.t,by:'Requested by '+rq.by,img:(rq.rid?A+rq.rid+'-after.jpg':''),pin:(rq.rid?{x:rq.x,y:rq.y,n:rq.n}:null),tag:'Fix this spot'}; });
    }
    if(j.rooms && j.rooms.length){
      return j.rooms.map(function(r,i){ var dc=r.style==='designer'; return {kind:'Stage this room',title:r.label,loc:'Photo '+(i+1)+' of '+j.rooms.length,instr:'Furnish in '+(dc?'the designer’s choice':(STY[r.style]||r.style))+' style, matched to the buyer’s taste.',by:'',img:r.orig,pin:null,tag:(dc?'✦ Designer’s choice':(STY[r.style]||r.style))}; });
    }
    return (j.services||[]).map(function(s){ return {kind:'Produce',title:s.n,loc:s.qty,instr:s.s,by:'',img:'',pin:null,tag:s.qty}; });
  }
  var fJob=null, fTasks=[], fIdx=0, fDone=[], fUploads={};
  function openFocus(j){ fJob=j; fTasks=buildTasks(j); fIdx=0; fDone=fTasks.map(function(){return false;}); fUploads={}; $('fComplete').classList.remove('show'); $('focus').classList.add('open'); renderFocus(); }
  function closeFocus(){ $('focus').classList.remove('open'); }
  function nextUndone(){ var i; for(i=fIdx+1;i<fTasks.length;i++){ if(!fDone[i]) return i; } for(i=0;i<fTasks.length;i++){ if(!fDone[i]) return i; } return fIdx; }
  function renderFocus(){
    var t=fTasks[fIdx]; if(!t) return;
    var doneCount=fDone.filter(Boolean).length;
    $('fId').innerHTML='<b>#'+fJob.id+'</b> · '+esc(fJob.addr);
    $('fXp').innerHTML=doneCount+' / '+fTasks.length+' done · <b>+'+(doneCount*10)+' XP</b>';
    $('fCount').textContent='Task '+(fIdx+1)+' of '+fTasks.length;
    $('fBar').style.width=Math.round(doneCount/fTasks.length*100)+'%';
    $('fDots').innerHTML=fTasks.map(function(x,i){ return '<button class="f-dot'+(i===fIdx?' cur':'')+(fDone[i]?' done':'')+'" data-i="'+i+'">'+(fDone[i]?'✓':(i+1))+'</button>'; }).join('');
    $('fDots').querySelectorAll('.f-dot').forEach(function(b){ b.onclick=function(){ fIdx=+b.getAttribute('data-i'); renderFocus(); }; });
    var pin=t.pin? '<span class="f-pin" style="left:'+t.pin.x+'%;top:'+t.pin.y+'%">'+t.pin.n+'</span>' : '';
    var visual= t.img
      ? '<div class="f-visual"><img src="'+t.img+'" alt=""><span class="f-tag">'+esc(t.tag)+'</span>'+pin+'<div class="f-burst" id="fBurst"><div class="chk">✓</div></div></div>'
      : '<div class="f-visual"><span class="f-tag">'+esc(t.tag)+'</span><div style="color:#6B7684;font-size:14px">Produced from the source files →</div><div class="f-burst" id="fBurst"><div class="chk">✓</div></div></div>';
    var ups=(fUploads[fIdx]||[]), done=fDone[fIdx];
    $('fStage').innerHTML=visual
      +'<div class="f-side"><div class="f-kind">'+esc(t.kind)+'</div><div class="f-title">'+esc(t.title)+'</div><div class="f-loc">'+esc(t.loc)+'</div>'
        +'<div class="f-instr">'+esc(t.instr)+(t.by?'<div class="by">'+esc(t.by)+'</div>':'')+'</div>'
        +'<label class="f-up" id="fUp"><input type="file" id="fUpInput" accept="image/*" multiple hidden><span class="ui"><svg viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 20h14"/></svg></span><span><b>Drop your finished file here</b><span>the result for this task</span></span>'+(ups.length?'<span class="done-chip">'+ups.length+' uploaded</span>':'')+'</label>'
        +(ups.length?'<div class="f-thumbs">'+ups.map(function(u){return '<div class="t"><img src="'+u+'"></div>';}).join('')+'</div>':'')
        +'<div class="f-actions"><button class="f-nav" id="fPrev" title="Previous (←)">‹</button>'
          +'<button class="f-done'+(done?' is-done':'')+'" id="fDoneBtn">'+(done?'✓ Done · press → for next':'Mark done')+'</button>'
          +'<button class="f-nav" id="fNext" title="Next (→)">›</button></div>'
      +'</div>';
    $('fPrev').disabled=fIdx<=0; $('fNext').disabled=fIdx>=fTasks.length-1;
    $('fPrev').onclick=function(){ if(fIdx>0){fIdx--;renderFocus();} };
    $('fNext').onclick=function(){ if(fIdx<fTasks.length-1){fIdx++;renderFocus();} };
    $('fDoneBtn').onclick=doneTask;
    bindFocusUp();
  }
  function bindFocusUp(){
    var zone=$('fUp'), input=$('fUpInput'); if(!zone||!input) return;
    input.onchange=function(){ addFocusUp(input.files); input.value=''; };
    ['dragenter','dragover'].forEach(function(ev){ zone.addEventListener(ev,function(e){e.preventDefault();zone.classList.add('drag');}); });
    ['dragleave','drop'].forEach(function(ev){ zone.addEventListener(ev,function(e){e.preventDefault();zone.classList.remove('drag');}); });
    zone.addEventListener('drop',function(e){ e.preventDefault(); if(e.dataTransfer&&e.dataTransfer.files) addFocusUp(e.dataTransfer.files); });
  }
  function addFocusUp(files){
    fUploads[fIdx]=fUploads[fIdx]||[];
    [].slice.call(files).forEach(function(f){ if(f.type&&f.type.indexOf('image')===0) fUploads[fIdx].push(URL.createObjectURL(f)); });
    renderFocus();
  }
  function burst(){ var b=$('fBurst'); if(!b) return; b.classList.remove('go'); void b.offsetWidth; b.classList.add('go'); }
  function doneTask(){
    var was=fDone[fIdx]; fDone[fIdx]=true; renderFocus(); if(!was) burst();
    setTimeout(function(){ if(fDone.every(Boolean)){ showComplete(); return; } fIdx=nextUndone(); renderFocus(); }, 680);
  }
  var CONF=['#B8985A','#3E6B4C','#7fbf94','#E7C36A','#fff','#3E6076'];
  function showComplete(){
    var c=$('fComplete');
    $('fcMsg').textContent='All '+fTasks.length+' task'+(fTasks.length>1?'s':'')+' done for '+fJob.addr+'. Nice work — that’s +'+(fTasks.length*10)+' XP.';
    var conf=''; for(var i=0;i<34;i++){ var left=(i*97+13)%100, dur=(2.2+((i*37)%16)/10).toFixed(2), delay=(((i*53)%20)/10).toFixed(2), col=CONF[i%CONF.length]; conf+='<span class="confetti" style="left:'+left+'%;background:'+col+';animation-duration:'+dur+'s;animation-delay:'+delay+'s"></span>'; }
    c.insertAdjacentHTML('afterbegin', '<div id="confHolder">'+conf+'</div>');
    c.classList.add('show');
  }
  $('fClose').onclick=closeFocus;
  $('fcBack').onclick=function(){ var h=$('confHolder'); if(h) h.remove(); closeFocus(); };
  $('fcSubmit').onclick=function(){ if(fJob){ fJob.status='qa'; } var h=$('confHolder'); if(h) h.remove(); $('fComplete').classList.remove('show'); closeFocus(); renderList(); renderDetail(); toast('#'+(fJob?fJob.id:'')+' submitted for Bella QA'); };
  document.addEventListener('keydown',function(e){
    if(!$('focus').classList.contains('open')) return;
    if($('fComplete').classList.contains('show')){ if(e.key==='Escape'){ $('fcBack').click(); } return; }
    if(e.key==='ArrowRight'){ if(fIdx<fTasks.length-1){fIdx++;renderFocus();} }
    else if(e.key==='ArrowLeft'){ if(fIdx>0){fIdx--;renderFocus();} }
    else if(e.key==='Enter'){ e.preventDefault(); doneTask(); }
    else if(e.key==='Escape'){ closeFocus(); }
    else if(e.key.toLowerCase()==='u'){ var i=$('fUpInput'); if(i){ e.preventDefault(); i.click(); } }
  });
  function bindUp(j){
    var zone=$('upZone'), input=$('upInput'); if(!zone||!input) return;
    input.onchange=function(){ addDeliv(j,input.files); input.value=''; };
    ['dragenter','dragover'].forEach(function(ev){ zone.addEventListener(ev,function(e){e.preventDefault();zone.classList.add('drag');}); });
    ['dragleave','drop'].forEach(function(ev){ zone.addEventListener(ev,function(e){e.preventDefault();zone.classList.remove('drag');}); });
    zone.addEventListener('drop',function(e){ if(e.dataTransfer&&e.dataTransfer.files) addDeliv(j,e.dataTransfer.files); });
  }
  function addDeliv(j,files){
    deliverables[j.id]=deliverables[j.id]||[];
    [].slice.call(files).forEach(function(f){ if(f.type&&f.type.indexOf('image')===0) deliverables[j.id].push(URL.createObjectURL(f)); });
    renderDetail();
  }

  renderHeader(); renderFilters(); renderList(); renderDetail();
})();
</script>
</body>
